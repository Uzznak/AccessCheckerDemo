<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AccessChecker</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 2rem; }
        .result-item { transition: all 0.2s; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-4">AccessChecker</h1>
        <p class="text-center text-muted mb-5">Vérifiez les accès d'un utilisateur</p>

        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body">
                        <form id="accessForm">
                            <div class="mb-3">
                                <label for="username" class="form-label">Nom d'utilisateur</label>
                                <input type="text" class="form-control" id="username" placeholder="ENtrez un nom d'utilisateur" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Vérifier</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div class="row justify-content-center mt-4">
            <div class="col-md-6">
                <h3>Résultats</h3>
                <div id="results" class="list-group">
                    <!-- Les résultats s'afficheront ici -->
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS (optionnel) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS intégré -->
    <script>
        document.getElementById('accessForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            if (!username) return;

            // Affiche un loading
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="text-center p-3"><div class="spinner-border" role="status"></div></div>';

            try {
                // Appel au backend
                const response = await fetch(`https://access-checker-demo.vercel.app/check_access?username=${username}`);
                if (!response.ok) throw new Error("Utilisateur non trouvé");

                const data = await response.json();
                afficherResultats(data);
            } catch (error) {
                resultsDiv.innerHTML = `<div class="alert alert-danger">${error.message}</div>`;
            }
        });

        function afficherResultats(access) {
            const services = ["VPN", "GitLab", "SSH", "Kubernetes"];
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = services.map(service => `
                <div class="list-group-item d-flex justify-content-between align-items-center">
                    ${service}
                    <span class="badge ${access[service] ? 'bg-success' : 'bg-danger'} rounded-pill">
                        ${access[service] ? 'yes' : 'no'}
                    </span>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
